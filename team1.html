<!DOCTYPE html>
<html>
<head>
<title>Scholarship Application Form</title>
<style>
body {
font-family: Arial, sans-serif;
background-color:black;
}
.container {
width: 60%;
margin: 20px auto;
padding: 20px;
background-color:lightblue;
border: 1px solid #ddd;
box-shadow: 0 0 10px rgba(0,0,0,0.1);
}
h2 {
text-align: center;
}
label {
display: block;
margin-top: 10px;
}
input, select, textarea {
width: 100%;
padding: 8px;
margin-top: 5px;
border: 1px solid #ccc;
border-radius: 4px;
}
button {
margin-top: 20px;
padding: 10px 20px;
background-color:blue;
color: white;
border: none;
border-radius: 4px;
cursor: pointer;
}
button:hover {
background-color:blue;
}
</style>
</head>
<body>
<div class="container">
<h2>Scholarship Application Form</h2>
<form action="/submit" method="post" enctype="multipart/form-data">
<label for="fullName">Full Name</label>
<input type="text" id="fullName" name="fullName" required>

<label for="dob">Date of Birth</label>
<input type="date" id="dob" name="dob" required>

<label for="phone">Phone Number</label>
<input type="tel" id="phone" name="phone" required>

<label for="address">Address</label>
<textarea id="address" name="address" rows="3" required></textarea>

<label for="gender">Gender</label>
<select id="gender" name="gender" required>
<option value="">Select</option>
<option value="male">Male</option>
<option value="female">Female</option>
<option value="other">Other</option>
</select>
<label for="gender">Pre or Postmetric</label>
<select id="gender" name="gender" required>
<option value="">Select</option>
<option value="Premetric">Premetric</option>
<option value="postmetric">Postmetric</option>

</select>



<label for="nationality">Nationality</label>
<input type="text" id="nationality" name="nationality" required>

<label for="education">Highest Educational Qualification</label>
<input type="text" id="education" name="education" required>

<label for="gpa">GPA / Percentage</label>
<input type="text" id="gpa" name="gpa" required>

<label for="course">Course Applying For</label>
<input type="text" id="course" name="course" required>

<label for="statement">Statement of Purpose</label>
<textarea id="statement" name="statement" rows="5" required></textarea>


<button type="submit">Submit Application</button>
</form>
</div>
</body>
</html>
